<!DOCTYPE html>

<html lang="ja">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ほぐし施術マッチングサイト</title>

<style>

body{

font-family:sans-serif;

background:#f4fff8;

padding:20px;

}

.container{

}

button{

color:white;

border:none;

padding:15px 30px;

border-radius:30px;

font-size:18px;

}

.price{

font-size:24px;

color:#ff6600;

font-weight:bold;

}

</style>

</head>

<body>

<header>

<h1>ほぐし施術マッチングサイト</h1>

<p>Healing Connect AI</p>

</header>

<div class="container">

<div class="card">

<h2>60分コース</h2>

<p class="price">6,000円</p>

<button>予約する</button>

</div>

<div class="card">

<h2>90分コース</h2>

<p class="price">9,000円</p>

<button>予約する</button>

</div>

<div class="card">

<h2>120分コース</h2>

<button>予約する</button>

</div>

</div>

</html>
